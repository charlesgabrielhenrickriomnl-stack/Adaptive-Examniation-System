<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Department View</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="homepage-page">
<div class="teacher-layout">
    <div th:replace="~{department-admin-nav :: departmentAdminNav}"></div>

    <div class="teacher-content-wrapper">
        <div class="container py-4">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                <div>
                    <h3 class="fw-bold mb-1" style="color:#7a1022;">
                        <i class="bi bi-building me-2"></i>Department View
                    </h3>
                    <p class="text-muted mb-0" th:text="${selectedDepartment}">Department</p>
                </div>
                <div class="d-flex align-items-center gap-2 flex-wrap">
                    <form class="d-flex align-items-center gap-2" th:action="@{/department-admin/department-view}" method="get">
                        <label class="form-label mb-0 small text-muted" for="departmentName">Department</label>
                        <select class="form-select form-select-sm" id="departmentName" name="departmentName" style="min-width: 240px;">
                            <option th:each="departmentOption : ${departmentOptions}"
                                    th:value="${departmentOption}"
                                    th:text="${departmentOption}"
                                    th:selected="${departmentOption == selectedDepartment}">
                                Department
                            </option>
                        </select>
                        <button type="submit" class="btn btn-sm btn-primary">View</button>
                    </form>
                    <a class="btn btn-outline-secondary btn-sm" th:href="@{/department-admin/dashboard}">
                        <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
                    </a>
                </div>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-body text-center">
                            <div class="h3 mb-1" th:text="${teacherCount}">0</div>
                            <div class="text-muted small">Teachers</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-body text-center">
                            <div class="h3 mb-1" th:text="${subjectCount}">0</div>
                            <div class="text-muted small">Subjects</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-body text-center">
                            <div class="h3 mb-1" th:text="${studentCount}">0</div>
                            <div class="text-muted small">Students</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header fw-semibold">Teachers and Students</div>
                <div class="card-body">
                    <div th:if="${teacherRows == null || teacherRows.isEmpty()}" class="text-muted small">
                        No teachers found for this department.
                    </div>

                    <div class="accordion" id="teacherAccordion" th:if="${teacherRows != null && !teacherRows.isEmpty()}">
                        <div class="accordion-item" th:each="teacherRow,teacherStat : ${teacherRows}">
                            <h2 class="accordion-header" th:id="${'heading' + teacherStat.index}">
                                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                                        th:attr="data-bs-target=${'#collapse' + teacherStat.index},aria-controls=${'collapse' + teacherStat.index}">
                                    <span class="fw-semibold" th:text="${teacherRow.teacher.fullName != null && !#strings.isEmpty(teacherRow.teacher.fullName) ? teacherRow.teacher.fullName : teacherRow.teacher.email}">Teacher</span>
                                    <span class="ms-2 text-muted" th:text="${'(' + teacherRow.teacher.email + ')'}">(email)</span>
                                    <span class="badge bg-light text-dark border ms-3" th:text="${teacherRow.subjectCount} + ' subject(s)'">0 subject(s)</span>
                                    <span class="badge bg-light text-dark border ms-2" th:text="${teacherRow.studentCount} + ' student(s)'">0 student(s)</span>
                                </button>
                            </h2>
                            <div class="accordion-collapse collapse"
                                 th:id="${'collapse' + teacherStat.index}"
                                 th:attr="aria-labelledby=${'heading' + teacherStat.index}"
                                 data-bs-parent="#teacherAccordion">
                                <div class="accordion-body">
                                    <div th:if="${teacherRow.studentRows == null || teacherRow.studentRows.isEmpty()}" class="text-muted small">
                                        No students enrolled under this teacher yet.
                                    </div>
                                    <div class="table-responsive" th:if="${teacherRow.studentRows != null && !teacherRow.studentRows.isEmpty()}">
                                        <table class="table table-sm table-hover align-middle mb-0">
                                            <thead class="table-light">
                                            <tr>
                                                <th>Student</th>
                                                <th>Email</th>
                                                <th>Program</th>
                                                <th>Subject</th>
                                            </tr>
                                            </thead>
                                            <tbody>
                                            <tr th:each="studentRow : ${teacherRow.studentRows}">
                                                <td th:text="${studentRow.studentName}">Student Name</td>
                                                <td th:text="${studentRow.studentEmail}">student@example.com</td>
                                                <td th:text="${studentRow.programName}">Program</td>
                                                <td th:text="${studentRow.subjectName}">Subject</td>
                                            </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
