<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Setting - ALGO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="homepage-page">

<div class="teacher-layout">
    <div th:replace="~{teacher-nav :: teacherNav}"></div>

    <div class="teacher-content-wrapper">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-10 col-lg-8">
                    <div class="card upload-card profile-card">
                        <div class="card-body p-4"> 

                            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                            <div class="profile-info-item">
                                <div class="profile-info-icon"><i class="fa-solid fa-user"></i></div>
                                <div class="profile-info-content">
                                    <div class="profile-info-label">Name</div>
                                    <div class="profile-info-value" th:text="${currentUserFullName ?: 'Teacher'}">Teacher</div>
                                </div>
                            </div>

                            <div class="profile-info-item">
                                <div class="profile-info-icon"><i class="fa-solid fa-envelope"></i></div>
                                <div class="profile-info-content">
                                    <div class="profile-info-label">Email</div>
                                    <div class="profile-info-value" th:text="${currentUserEmail ?: 'N/A'}">N/A</div>
                                </div>
                            </div>

                            <div class="profile-info-item mb-4">
                                <div class="profile-info-icon"><i class="fa-solid fa-user-tag"></i></div>
                                <div class="profile-info-content">
                                    <div class="profile-info-label">Role</div>
                                    <div class="profile-info-value" th:text="${currentUserRole ?: 'TEACHER'}">TEACHER</div>
                                </div>
                            </div>

                            <div class="profile-info-item">
                                <div class="profile-info-icon"><i class="fa-solid fa-school"></i></div>
                                <div class="profile-info-content">
                                    <div class="profile-info-label">School</div>
                                    <div class="profile-info-value" th:text="${currentUserSchool ?: 'Emilio Aguinaldo College'}">Emilio Aguinaldo College</div>
                                </div>
                            </div>

                            <div class="profile-info-item">
                                <div class="profile-info-icon"><i class="fa-solid fa-location-dot"></i></div>
                                <div class="profile-info-content">
                                    <div class="profile-info-label">Campus</div>
                                    <div class="profile-info-value" th:text="${currentUserCampus ?: 'Manila'}">Manila</div>
                                </div>
                            </div>

                            <div class="profile-info-item mb-4">
                                <div class="profile-info-icon"><i class="fa-solid fa-building-columns"></i></div>
                                <div class="profile-info-content">
                                    <div class="profile-info-label">Department</div>
                                    <div class="profile-info-value" th:text="${currentUserDepartment ?: 'Not set'}">Not set</div>
                                </div>
                            </div>

                            <div class="profile-info-item mb-4">
                                <div class="profile-info-icon"><i class="fa-solid fa-graduation-cap"></i></div>
                                <div class="profile-info-content">
                                    <div class="profile-info-label">Program</div>
                                    <div class="profile-info-value" th:text="${currentUserProgram ?: 'Not set'}">Not set</div>
                                </div>
                            </div>

                            <div class="profile-info-item mb-4">
                                <div class="profile-info-icon"><i class="fa-solid fa-pen-to-square"></i></div>
                                <div class="profile-info-content">
                                    <div class="profile-info-label">Set Department and Program</div>
                                    <form th:action="@{/account/update-affiliation}" method="post" class="d-flex gap-2 flex-wrap align-items-center">
                                        <select class="form-select" id="teacherDepartmentSelect" name="departmentName" style="max-width: 340px;" required>
                                            <option value="">Select Department</option>
                                            <option th:each="department : ${departmentOptions}"
                                                    th:value="${department}"
                                                    th:text="${department}"
                                                    th:selected="${department == currentUserDepartment}"></option>
                                        </select>
                                        <select class="form-select" id="teacherProgramSelect" name="programName" style="max-width: 380px;">
                                            <option value="">Select Program</option>
                                        </select>
                                        <button type="submit" class="btn btn-outline-primary">Save</button>
                                    </form>
                                </div>
                            </div>

                            <form th:action="@{/logout}" method="post" class="text-end">
                                <button type="submit" class="btn btn-primary px-4">Logout
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.profile-card {
    max-width: 760px;
    margin: 0 auto;
}

.section-title {
    font-weight: 700;
    color: #5e2c2c;
    margin-bottom: 0.75rem;
    font-size: 1rem;
}

.profile-info-item {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.75rem 0;
    border-bottom: 1px solid #eee2d0;
}

.profile-info-icon {
    color: #7a3f3f;
    width: 1.25rem;
    text-align: center;
    line-height: 1.2;
    margin-top: 0.15rem;
}

.profile-info-content {
    flex: 1;
    min-width: 0;
}

.profile-info-item:last-of-type {
    border-bottom: 0;
}

.profile-info-label {
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #8a7d68;
    margin-bottom: 0.2rem;
}

.profile-info-value {
    font-size: 0.98rem;
    color: #2a2a2a;
    font-weight: 600;
    word-break: break-word;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    (function () {
        const programsByDepartment = /*[[${programOptionsByDepartment}]]*/ {};
        const currentProgram = /*[[${currentUserProgram}]]*/ '';
        const departmentSelect = document.getElementById('teacherDepartmentSelect');
        const programSelect = document.getElementById('teacherProgramSelect');
        if (!departmentSelect || !programSelect) {
            return;
        }

        function syncPrograms() {
            const selectedDepartment = departmentSelect.value || '';
            const programs = programsByDepartment[selectedDepartment] || [];
            const previous = programSelect.value || currentProgram || '';

            programSelect.innerHTML = '<option value="">Select Program</option>';
            programs.forEach(program => {
                const option = document.createElement('option');
                option.value = program;
                option.textContent = program;
                programSelect.appendChild(option);
            });

            if (previous && programs.includes(previous)) {
                programSelect.value = previous;
            }
            programSelect.required = programs.length > 0;
        }

        departmentSelect.addEventListener('change', syncPrograms);
        syncPrograms();
    })();
</script>
</body>
</html>
